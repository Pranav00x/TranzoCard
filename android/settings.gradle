pluginManagement {
  def projectRoot = rootDir.getParentFile()
  println "DEBUG: Project root is ${projectRoot.absolutePath}"
  
  def resolvePluginPath = { String name, String rootPath ->
    try {
      def result = providers.exec {
        workingDir(new File(rootPath))
        commandLine("node", "--print", "require.resolve('" + name + "/package.json', { paths: ['" + rootPath + "'] })")
      }.standardOutput.asText.get().trim()
      def path = new File(result).getParentFile().absolutePath
      println "DEBUG: Resolved ${name} package to ${path}"
      return path
    } catch (Exception e) {
      println "DEBUG: Node resolution failed for ${name}: ${e.message}"
      def fallback = new File(rootPath, "node_modules/" + name)
      if (fallback.exists()) {
          println "DEBUG: Fallback found for ${name} at ${fallback.absolutePath}"
          return fallback.absolutePath
      }
      println "DEBUG: No fallback found for ${name}"
      return null
    }
  }

  def rnPluginPath = resolvePluginPath("@react-native/gradle-plugin", projectRoot.absolutePath)
  if (rnPluginPath) {
    println "DEBUG: Including RN plugin build from ${rnPluginPath}"
    includeBuild(rnPluginPath)
  }
  
  def expoAutolinkingPath = resolvePluginPath("expo-modules-autolinking", projectRoot.absolutePath)
  if (expoAutolinkingPath) {
    // Standard Expo path resolution for the gradle plugin
    def pkgPath = new File(projectRoot, "node_modules/expo-modules-autolinking/package.json").absolutePath
    def expoPluginsPath = new File(pkgPath, "../android/expo-gradle-plugin").getCanonicalPath()
    println "DEBUG: Calculated expoPluginsPath as ${expoPluginsPath}"
    if (new File(expoPluginsPath).exists()) {
      println "DEBUG: Including Expo plugin build from ${expoPluginsPath}"
      includeBuild(expoPluginsPath)
    } else {
      println "DEBUG: Expo plugins path DOES NOT EXIST"
      // Try alternative
      def altPath = new File(expoAutolinkingPath, "android/expo-gradle-plugin").absolutePath
      if (new File(altPath).exists()) {
          println "DEBUG: Found alternate Expo plugins path at ${altPath}"
          includeBuild(altPath)
      }
    }
  }
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

def projectRoot = rootDir.getParentFile()
expoAutolinking.projectRoot = projectRoot

def autolinkingScript = ""
try {
    autolinkingScript = providers.exec {
        workingDir(projectRoot)
        commandLine("node", "--print", "require.resolve('expo/bin/autolinking')")
    }.standardOutput.asText.get().trim()
} catch (Exception e) {
    def fallback = new File(projectRoot, "node_modules/expo/bin/autolinking")
    if (fallback.exists()) autolinkingScript = fallback.absolutePath
}

if (autolinkingScript && new File(autolinkingScript).exists()) {
    def finalCommand = [
        "node", 
        "--no-warnings", 
        "--eval",
        "require('${autolinkingScript.replace('\\', '/')}')",
        "expo-modules-autolinking", 
        "react-native-config", 
        "--platform", 
        "android", 
        "--json", 
        "--project-root", 
        projectRoot.absolutePath,
        "--source-dir",
        rootDir.absolutePath
    ]
    println "DEBUG: Running autolinking command: ${finalCommand}"
    
    try {
        def testExec = providers.exec {
            workingDir(projectRoot)
            commandLine(finalCommand)
            ignoreExitValue = true
        }
        println "DEBUG: Autolinking stdout: ${testExec.standardOutput.asText.get()}"
        println "DEBUG: Autolinking stderr: ${testExec.standardError.asText.get()}"
    } catch (Exception e) {
        println "DEBUG: Test execution failed: ${e.message}"
    }

    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
      ex.autolinkLibrariesFromCommand(finalCommand)
    }
} else {
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
      ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
    }
}

expoAutolinking.useExpoModules()

rootProject.name = 'Tranzo'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
