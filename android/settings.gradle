pluginManagement {
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(rootDir.getParentFile())
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [require.resolve('react-native/package.json')] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    providers.exec {
      workingDir(rootDir.getParentFile())
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [require.resolve('expo/package.json')] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

expoAutolinking.projectRoot = rootDir.getParentFile()
def projectRoot = expoAutolinking.projectRoot

println "DEBUG: rootDir is ${rootDir.absolutePath}"
println "DEBUG: projectRoot is ${projectRoot.absolutePath}"

def autolinkingScript = ""
try {
    autolinkingScript = providers.exec {
        workingDir(projectRoot)
        commandLine("node", "--print", "require.resolve('expo/bin/autolinking')")
    }.standardOutput.asText.get().trim()
} catch (Exception e) {
    println "DEBUG: Failed to resolve expo/bin/autolinking: ${e.message}"
}

if (autolinkingScript != "") {
    def customCommand = expoAutolinking.rnConfigCommand.collect { 
        it.contains("require('expo/bin/autolinking')") ? it.replace("require('expo/bin/autolinking')", "require('${autolinkingScript.replace('\\', '/')}')") : it 
    }
    println "DEBUG: customCommand is ${customCommand}"
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
      ex.autolinkLibrariesFromCommand(customCommand)
    }
} else {
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
      ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
    }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Tranzo'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
