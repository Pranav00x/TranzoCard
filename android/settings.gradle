pluginManagement {
  def projectRoot = rootDir.getParentFile()
  def reactNativeGradlePlugin = new File(
    providers.exec {
      workingDir(projectRoot)
      commandLine("node", "--print", "require.resolve('@react-native/gradle-plugin/package.json', { paths: [projectRoot.absolutePath] })")
    }.standardOutput.asText.get().trim()
  ).getParentFile().absolutePath
  includeBuild(reactNativeGradlePlugin)
  
  def expoPluginsPath = new File(
    providers.exec {
      workingDir(projectRoot)
      commandLine("node", "--print", "require.resolve('expo-modules-autolinking/package.json', { paths: [projectRoot.absolutePath] })")
    }.standardOutput.asText.get().trim(),
    "../android/expo-gradle-plugin"
  ).absolutePath
  includeBuild(expoPluginsPath)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

def projectRoot = rootDir.getParentFile()
expoAutolinking.projectRoot = projectRoot

def autolinkingScript = providers.exec {
    workingDir(projectRoot)
    commandLine("node", "--print", "require.resolve('expo/bin/autolinking')")
}.standardOutput.asText.get().trim()

def finalCommand = [
    "node", 
    "--no-warnings", 
    autolinkingScript, 
    "expo-modules-autolinking", 
    "react-native-config", 
    "--platform", 
    "android", 
    "--json", 
    "--project-root", 
    projectRoot.absolutePath
]

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  ex.autolinkLibrariesFromCommand(finalCommand)
}

expoAutolinking.useExpoModules()

rootProject.name = 'Tranzo'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
