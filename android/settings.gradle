pluginManagement {
  def projectRoot = rootDir.getParentFile()
  
  def resolvePluginPath = { String name, String rootPath ->
    try {
      def result = providers.exec {
        workingDir(new File(rootPath))
        commandLine("node", "--print", "require.resolve('" + name + "/package.json', { paths: [rootPath] })")
      }.standardOutput.asText.get().trim()
      return new File(result).getParentFile().absolutePath
    } catch (Exception e) {
      def fallback = new File(rootPath, "node_modules/" + name)
      return fallback.exists() ? fallback.absolutePath : null
    }
  }

  def rnPluginPath = resolvePluginPath("@react-native/gradle-plugin", projectRoot.absolutePath)
  if (rnPluginPath) includeBuild(rnPluginPath)
  
  def expoAutolinkingPath = resolvePluginPath("expo-modules-autolinking", projectRoot.absolutePath)
  if (expoAutolinkingPath) {
    def expoPluginsPath = new File(expoAutolinkingPath, "android/expo-gradle-plugin").absolutePath
    if (!new File(expoPluginsPath).exists()) {
        expoPluginsPath = new File(projectRoot, "node_modules/expo-modules-autolinking/android/expo-gradle-plugin").absolutePath
    }
    if (new File(expoPluginsPath).exists()) includeBuild(expoPluginsPath)
  }
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

def projectRoot = rootDir.getParentFile()
expoAutolinking.projectRoot = projectRoot

def autolinkingScript = ""
try {
    autolinkingScript = providers.exec {
        workingDir(projectRoot)
        commandLine("node", "--print", "require.resolve('expo/bin/autolinking')")
    }.standardOutput.asText.get().trim()
} catch (Exception e) {
    def fallback = new File(projectRoot, "node_modules/expo/bin/autolinking")
    if (fallback.exists()) autolinkingScript = fallback.absolutePath
}

if (autolinkingScript && new File(autolinkingScript).exists()) {
    def autolinkCommand = [
        "node",
        "--no-warnings",
        "--eval",
        "require('${autolinkingScript.replace('\\', '/')}')",
        "expo-modules-autolinking",
        "react-native-config",
        "--platform",
        "android",
        "--json",
        "--project-root",
        projectRoot.absolutePath
    ]
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
      ex.autolinkLibrariesFromCommand(autolinkCommand)
    }
} else {
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
      ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
    }
}

expoAutolinking.useExpoModules()

rootProject.name = 'Tranzo'

expoAutolinking.useExpoVersionCatalog()

include ':app'
includeBuild(expoAutolinking.reactNativeGradlePlugin)
